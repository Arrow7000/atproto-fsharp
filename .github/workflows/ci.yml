name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: |
          dotnet test --configuration Release --no-build 2>&1 | tee test-output.txt

      - name: Extract test count
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TOTAL=$(grep -oP 'Passed:\s+\K\d+' test-output.txt | awk '{s+=$1} END {print s}')
          echo "TEST_COUNT=$TOTAL" >> $GITHUB_ENV
          echo "Total tests: $TOTAL"

      - name: Update test count badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.TEST_BADGE_GIST_ID }}
          filename: test-count.json
          label: tests
          message: ${{ env.TEST_COUNT }}
          color: brightgreen
